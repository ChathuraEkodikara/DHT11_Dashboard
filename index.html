<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Agriculture Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
  text-align: center;
}

h1 { margin-bottom: 10px; }

.status-box {
  font-size: 18px;
  margin-bottom: 25px;
}

.online { color: #22c55e; }
.offline { color: #ef4444; }

.signal {
  display: inline-flex;
  align-items: flex-end;
  gap: 3px;
  margin-left: 10px;
}

.bar {
  width: 6px;
  background: #334155;
  border-radius: 2px;
}

.bar.active { background: #22c55e; }

.bar:nth-child(1) { height: 6px; }
.bar:nth-child(2) { height: 10px; }
.bar:nth-child(3) { height: 14px; }
.bar:nth-child(4) { height: 18px; }

.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  width: 260px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.value {
  font-size: 28px;
  margin-top: 10px;
}

.sensor-status {
  margin-top: 10px;
  font-size: 16px;
}

.normal { color: #22c55e; }
.warning { color: #facc15; }
.danger { color: #ef4444; }

select, button {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

button {
  cursor: pointer;
  background: #3b82f6;
  color: white;
}

button:hover {
  background: #2563eb;
}

</style>
</head>

<body>

<h1>🌱 Smart Agriculture Dashboard</h1>

<div class="status-box">
  Device Status:
  <span id="deviceStatus">Checking...</span>
  |
  WiFi:
  <span class="signal" id="wifiSignal">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </span>
</div>

<div class="container">

  <!-- Temperature -->
  <div class="card">
    <h3>🌡 Temperature</h3>
    <div class="value"><span id="temp">--</span> °C</div>
    <div class="sensor-status" id="tempStatus">--</div>
  </div>

  <!-- Humidity -->
  <div class="card">
    <h3>💧 Humidity</h3>
    <div class="value"><span id="humidity">--</span> %</div>
    <div class="sensor-status" id="humStatus">--</div>
  </div>

  <!-- Soil -->
  <div class="card">
    <h3>🌾 Soil Moisture</h3>
    <div class="value"><span id="soil">--</span> %</div>
    <div class="sensor-status" id="soilStatus">--</div>
  </div>

  <!-- Fan Control -->
  <div class="card">
    <h3>🌬 Fan Control</h3>

    <select id="modeSelect">
      <option value="AUTO">Automatic</option>
      <option value="MANUAL">Manual</option>
    </select>

    <br><br>

    <button id="fanBtn">Toggle Fan</button>

    <div class="value" id="fanStatus">--</div>
  </div>

</div>

<script>

/* -------- FIREBASE CONFIG -------- */

firebase.initializeApp({
  apiKey: "YOUR_API_KEY",
  databaseURL: "https://test-project-f4a2b-default-rtdb.firebaseio.com"
});

const db = firebase.database();

/* -------- SENSOR LISTENERS -------- */

db.ref("sensor/temperature").on("value", snap => {
  if (!snap.exists()) return;
  const temp = snap.val();
  document.getElementById("temp").innerText = temp.toFixed(1);

  let text, cls;
  if (temp < 15) { text="Too Cold"; cls="warning"; }
  else if (temp > 35) { text="Too Hot"; cls="danger"; }
  else { text="Normal"; cls="normal"; }

  const el=document.getElementById("tempStatus");
  el.innerText=text;
  el.className="sensor-status "+cls;
});

db.ref("sensor/humidity").on("value", snap => {
  if (!snap.exists()) return;
  const hum = snap.val();
  document.getElementById("humidity").innerText = hum;

  let text, cls;
  if (hum < 40) { text="Dry Air"; cls="warning"; }
  else if (hum > 80) { text="Very Humid"; cls="danger"; }
  else { text="Normal"; cls="normal"; }

  const el=document.getElementById("humStatus");
  el.innerText=text;
  el.className="sensor-status "+cls;
});

db.ref("sensor/soil").on("value", snap => {
  if (!snap.exists()) return;
  const soil = snap.val();
  document.getElementById("soil").innerText = soil;

  let text, cls;
  if (soil < 30) { text="Needs Water"; cls="danger"; }
  else if (soil < 50) { text="Slightly Dry"; cls="warning"; }
  else { text="Optimal"; cls="normal"; }

  const el=document.getElementById("soilStatus");
  el.innerText=text;
  el.className="sensor-status "+cls;
});

/* -------- FAN STATUS -------- */

const fanRef = db.ref("sensor/fan");
fanRef.on("value", snap => {
  if (!snap.exists()) return;
  const state = snap.val();
  document.getElementById("fanStatus").innerText =
    state ? "🟢 ON" : "🔴 OFF";
});

/* -------- CONTROL -------- */

const modeRef = db.ref("control/mode");
const manualRef = db.ref("control/fanManual");

document.getElementById("modeSelect").addEventListener("change", e => {
  modeRef.set(e.target.value);
});

document.getElementById("fanBtn").addEventListener("click", () => {
  manualRef.once("value").then(snap => {
    const current = snap.val() || false;
    manualRef.set(!current);
  });
});

modeRef.on("value", snap => {
  if (!snap.exists()) return;
  document.getElementById("modeSelect").value = snap.val();
});

/* -------- DEVICE STATUS -------- */

let lastSeenTime = 0;
let wifiRSSI = null;

db.ref("device/lastSeen").on("value", snap => {
  if (!snap.exists()) return;
  lastSeenTime = snap.val();
});

db.ref("device/wifiRSSI").on("value", snap => {
  if (!snap.exists()) return;
  wifiRSSI = snap.val();
});

setInterval(() => {

  const statusEl = document.getElementById("deviceStatus");
  const bars = document.querySelectorAll("#wifiSignal .bar");

  if (!lastSeenTime) return;

  const diff = Date.now() - lastSeenTime;

  if (diff < 10000) {

    statusEl.innerText = "🟢 ONLINE";
    statusEl.className = "online";

    let level = 0;
    if (wifiRSSI > -50) level = 4;
    else if (wifiRSSI > -65) level = 3;
    else if (wifiRSSI > -75) level = 2;
    else if (wifiRSSI > -85) level = 1;

    bars.forEach((bar, index) => {
      if (index < level) bar.classList.add("active");
      else bar.classList.remove("active");
    });

  } else {

    statusEl.innerText = "🔴 OFFLINE";
    statusEl.className = "offline";
    bars.forEach(bar => bar.classList.remove("active"));
  }

}, 2000);

</script>

</body>
</html>
