<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Agriculture Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
text-align:center;
}

h1{margin-bottom:10px;}

.status-box{
font-size:18px;
margin-bottom:25px;
}

.online{color:#22c55e;}
.offline{color:#ef4444;}

.signal{
display:inline-flex;
align-items:flex-end;
gap:3px;
margin-left:8px;
}

.bar{
width:6px;
background:#334155;
border-radius:2px;
}

.bar.active{background:#22c55e;}

.bar:nth-child(1){height:6px;}
.bar:nth-child(2){height:10px;}
.bar:nth-child(3){height:14px;}
.bar:nth-child(4){height:18px;}

.row{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:30px;
}

.row-center{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
width:280px;
box-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.value{
font-size:26px;
margin-top:10px;
}

.sensor-status{
margin-top:10px;
font-size:16px;
}

.normal{color:#22c55e;}
.warning{color:#facc15;}
.danger{color:#ef4444;}

select,input,button{
padding:6px;
border-radius:8px;
border:none;
font-size:14px;
margin-top:6px;
}

input{
width:70px;
text-align:center;
}

button{
cursor:pointer;
background:#3b82f6;
color:white;
}

button:hover{
background:#2563eb;
}

.switch{
position:relative;
display:inline-block;
width:60px;
height:34px;
margin-top:10px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
background-color:#555;
transition:.4s;
border-radius:34px;
top:0;
left:0;
right:0;
bottom:0;
}

.slider:before{
position:absolute;
content:"";
height:26px;
width:26px;
left:4px;
bottom:4px;
background:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background-color:#22c55e;
}

input:checked + .slider:before{
transform:translateX(26px);
}

input:disabled + .slider{
background:#333;
cursor:not-allowed;
}

</style>
</head>

<body>

<h1>🌱 Smart Agriculture Dashboard</h1>

<div class="status-box">
Device:
<span id="deviceStatus">Checking...</span>
|
WiFi:
<span class="signal" id="wifiSignal">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</span>
</div>

<!-- SENSOR ROW -->

<div class="row">

<div class="card">
<h3>🌡 Temperature</h3>
<div class="value"><span id="temp">--</span> °C</div>
<div class="sensor-status" id="tempStatus">--</div>
</div>

<div class="card">
<h3>💧 Humidity</h3>
<div class="value"><span id="humidity">--</span> %</div>
<div class="sensor-status" id="humStatus">--</div>
</div>

<div class="card">
<h3>🌾 Soil Moisture</h3>
<div class="value"><span id="soil">--</span> %</div>
<div class="sensor-status" id="soilStatus">--</div>
</div>

</div>

<!-- CONTROL ROW -->

<div class="row-center">

<!-- FAN CARD -->

<div class="card">

<h3>🌬 Fan Control</h3>

<label>Mode:</label><br>

<select id="modeSelect">
<option value="AUTO">Automatic</option>
<option value="MANUAL">Manual</option>
</select>

<br>

<label class="switch">
<input type="checkbox" id="fanSwitch">
<span class="slider"></span>
</label>

<div class="value" id="fanStatus">--</div>

<br>

<strong>Temperature Thresholds</strong><br>

ON:
<input type="number" id="tempOnInput">

OFF:
<input type="number" id="tempOffInput">

<br><br>

<strong>Humidity Thresholds</strong><br>

ON:
<input type="number" id="humOnInput">

OFF:
<input type="number" id="humOffInput">

<br><br>

<button id="saveThresholds">Save Thresholds</button>

</div>


<!-- PUMP CARD -->

<div class="card">

<h3>🚿 Pump Control</h3>

<label>Mode:</label><br>

<select id="pumpModeSelect">
<option value="AUTO">Automatic</option>
<option value="MANUAL">Manual</option>
</select>

<br>

<label class="switch">
<input type="checkbox" id="pumpSwitch">
<span class="slider"></span>
</label>

<div class="value" id="pumpStatus">--</div>

<br>

<strong>Soil Moisture Thresholds</strong><br>

ON:
<input type="number" id="soilOnInput">

OFF:
<input type="number" id="soilOffInput">

<br><br>

<button id="saveSoilThresholds">Save Soil Thresholds</button>

</div>

</div>

<script>

/* Firebase Init */

firebase.initializeApp({
apiKey:"AIzaSyAEAGpHaCg0uUIyrsa165zY5xECBn0JpuY",
databaseURL:"https://test-project-f4a2b-default-rtdb.firebaseio.com"
});

const db=firebase.database();

/* SENSOR DATA */

db.ref("sensor/temperature").on("value",s=>{
if(!s.exists())return;
let t=s.val();
temp.innerText=t.toFixed(1);
});

db.ref("sensor/humidity").on("value",s=>{
if(!s.exists())return;
humidity.innerText=s.val();
});

db.ref("sensor/soil").on("value",s=>{
if(!s.exists())return;
soil.innerText=s.val();
});

/* FAN STATUS */

const fanSwitch=document.getElementById("fanSwitch");

db.ref("sensor/fan").on("value",s=>{
if(!s.exists())return;
let st=s.val();
fanSwitch.checked=st;
fanStatus.innerText=st?"🟢 ON":"🔴 OFF";
});

/* PUMP STATUS */

const pumpSwitch=document.getElementById("pumpSwitch");

db.ref("sensor/pump").on("value",s=>{
if(!s.exists())return;
let st=s.val();
pumpSwitch.checked=st;
pumpStatus.innerText=st?"🟢 ON":"🔴 OFF";
});

/* FAN MODE */

const modeRef=db.ref("control/mode");
const fanManual=db.ref("control/fanManual");

modeRef.on("value",s=>{
let mode=s.val();
modeSelect.value=mode;
fanSwitch.disabled=(mode==="AUTO");
});

modeSelect.addEventListener("change",e=>{
modeRef.set(e.target.value);
});

fanSwitch.addEventListener("change",()=>{
if(!fanSwitch.disabled)
fanManual.set(fanSwitch.checked);
});

/* PUMP MODE */

const pumpModeRef=db.ref("control/pumpMode");
const pumpManual=db.ref("control/pumpManual");

pumpModeRef.on("value",s=>{
let mode=s.val();
pumpModeSelect.value=mode;
pumpSwitch.disabled=(mode==="AUTO");
});

pumpModeSelect.addEventListener("change",e=>{
pumpModeRef.set(e.target.value);
});

pumpSwitch.addEventListener("change",()=>{
if(!pumpSwitch.disabled)
pumpManual.set(pumpSwitch.checked);
});

/* FAN THRESHOLDS */

saveThresholds.onclick=()=>{
db.ref("control/tempOn").set(parseFloat(tempOnInput.value));
db.ref("control/tempOff").set(parseFloat(tempOffInput.value));
db.ref("control/humOn").set(parseFloat(humOnInput.value));
db.ref("control/humOff").set(parseFloat(humOffInput.value));
alert("Thresholds Updated");
};

/* SOIL THRESHOLDS */

saveSoilThresholds.onclick=()=>{
db.ref("control/soilOn").set(parseInt(soilOnInput.value));
db.ref("control/soilOff").set(parseInt(soilOffInput.value));
alert("Soil Settings Saved");
};

</script>

</body>
</html>
