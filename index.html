<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Agriculture Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
  text-align: center;
}

h1 { margin-bottom: 10px; }

.status-box {
  font-size: 18px;
  margin-bottom: 25px;
}

.online { color: #22c55e; }
.offline { color: #ef4444; }

.signal {
  display: inline-flex;
  align-items: flex-end;
  gap: 3px;
  margin-left: 8px;
}

.bar {
  width: 6px;
  background: #334155;
  border-radius: 2px;
}

.bar.active { background: #22c55e; }

.bar:nth-child(1) { height: 6px; }
.bar:nth-child(2) { height: 10px; }
.bar:nth-child(3) { height: 14px; }
.bar:nth-child(4) { height: 18px; }

/* FIRST ROW */
.row {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 30px;
}

/* SECOND ROW */
.row-center {
  display: flex;
  justify-content: center;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  width: 280px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.value {
  font-size: 26px;
  margin-top: 10px;
}

.sensor-status {
  margin-top: 10px;
  font-size: 16px;
}

.normal { color: #22c55e; }
.warning { color: #facc15; }
.danger { color: #ef4444; }

select, input {
  padding: 6px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  margin-top: 4px;
}

input {
  width: 70px;
  text-align: center;
}

/* Toggle Switch */
.switch {
  position: relative;
  display: inline-block;
  width: 60px;
  height: 34px;
  margin-top: 10px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  background-color: #555;
  transition: .4s;
  border-radius: 34px;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
}

.slider:before {
  position: absolute;
  content: "";
  height: 26px;
  width: 26px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  transition: .4s;
  border-radius: 50%;
}

input:checked + .slider {
  background-color: #22c55e;
}

input:checked + .slider:before {
  transform: translateX(26px);
}

input:disabled + .slider {
  background-color: #333;
  cursor: not-allowed;
}
</style>
</head>

<body>

<h1>🌱 Smart Agriculture Dashboard</h1>

<div class="status-box">
  Device:
  <span id="deviceStatus">Checking...</span>
  |
  WiFi:
  <span class="signal" id="wifiSignal">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </span>
</div>

<!-- FIRST ROW -->
<div class="row">

  <div class="card">
    <h3>🌡 Temperature</h3>
    <div class="value"><span id="temp">--</span> °C</div>
    <div class="sensor-status" id="tempStatus">--</div>
  </div>

  <div class="card">
    <h3>💧 Humidity</h3>
    <div class="value"><span id="humidity">--</span> %</div>
    <div class="sensor-status" id="humStatus">--</div>
  </div>

  <div class="card">
    <h3>🌾 Soil Moisture</h3>
    <div class="value"><span id="soil">--</span> %</div>
    <div class="sensor-status" id="soilStatus">--</div>
  </div>

</div>

<!-- SECOND ROW -->
<div class="row-center">
  <div class="card">
    <h3>🌬 Fan Control</h3>

    <label>Mode:</label><br>
    <select id="modeSelect">
      <option value="AUTO">Automatic</option>
      <option value="MANUAL">Manual</option>
    </select>

    <br>

    <label class="switch">
      <input type="checkbox" id="fanSwitch">
      <span class="slider"></span>
    </label>

    <div class="value" id="fanStatus">--</div>

    <br>

    <strong>Temperature Thresholds</strong><br>
    ON:
    <input type="number" id="tempOnInput">
    OFF:
    <input type="number" id="tempOffInput">

    <br><br>

    <strong>Humidity Thresholds</strong><br>
    ON:
    <input type="number" id="humOnInput">
    OFF:
    <input type="number" id="humOffInput">

    <br><br>

    <button id="saveThresholds">Save Thresholds</button>
  </div>
</div>

<script>

/* Firebase Init */
firebase.initializeApp({
  apiKey: "YOUR_API_KEY",
  databaseURL: "https://test-project-f4a2b-default-rtdb.firebaseio.com"
});

const db = firebase.database();

/* Sensor Updates */
db.ref("sensor/temperature").on("value", snap => {
  if (!snap.exists()) return;
  const temp = snap.val();
  document.getElementById("temp").innerText = temp.toFixed(1);
});

db.ref("sensor/humidity").on("value", snap => {
  if (!snap.exists()) return;
  document.getElementById("humidity").innerText = snap.val();
});

db.ref("sensor/soil").on("value", snap => {
  if (!snap.exists()) return;
  document.getElementById("soil").innerText = snap.val();
});

/* Fan Status */
const fanSwitch = document.getElementById("fanSwitch");
db.ref("sensor/fan").on("value", snap => {
  if (!snap.exists()) return;
  const state = snap.val();
  fanSwitch.checked = state;
  document.getElementById("fanStatus").innerText =
    state ? "🟢 ON" : "🔴 OFF";
});

/* Control */
const modeRef = db.ref("control/mode");
const manualRef = db.ref("control/fanManual");

modeRef.on("value", snap => {
  if (!snap.exists()) return;
  const mode = snap.val();
  document.getElementById("modeSelect").value = mode;
  fanSwitch.disabled = (mode === "AUTO");
});

document.getElementById("modeSelect").addEventListener("change", e => {
  modeRef.set(e.target.value);
});

fanSwitch.addEventListener("change", () => {
  if (!fanSwitch.disabled)
    manualRef.set(fanSwitch.checked);
});

/* Thresholds */
const tempOnRef = db.ref("control/tempOn");
const tempOffRef = db.ref("control/tempOff");
const humOnRef = db.ref("control/humOn");
const humOffRef = db.ref("control/humOff");

tempOnRef.on("value", s => { if (s.exists()) tempOnInput.value = s.val(); });
tempOffRef.on("value", s => { if (s.exists()) tempOffInput.value = s.val(); });
humOnRef.on("value", s => { if (s.exists()) humOnInput.value = s.val(); });
humOffRef.on("value", s => { if (s.exists()) humOffInput.value = s.val(); });

document.getElementById("saveThresholds").addEventListener("click", () => {

  let tOn = parseFloat(tempOnInput.value);
  let tOff = parseFloat(tempOffInput.value);
  let hOn = parseFloat(humOnInput.value);
  let hOff = parseFloat(humOffInput.value);

  if (tOff >= tOn || hOff >= hOn) {
    alert("OFF value must be lower than ON value.");
    return;
  }

  tempOnRef.set(tOn);
  tempOffRef.set(tOff);
  humOnRef.set(hOn);
  humOffRef.set(hOff);
});

/* Device Status */
let lastSeen = 0, rssi = null;

db.ref("device/lastSeen").on("value", s => { if (s.exists()) lastSeen = s.val(); });
db.ref("device/wifiRSSI").on("value", s => { if (s.exists()) rssi = s.val(); });

setInterval(() => {
  const statusEl = document.getElementById("deviceStatus");
  const bars = document.querySelectorAll("#wifiSignal .bar");
  if (!lastSeen) return;

  if (Date.now() - lastSeen < 10000) {
    statusEl.innerText = "🟢 ONLINE";
    statusEl.className = "online";

    let level = 0;
    if (rssi > -50) level = 4;
    else if (rssi > -65) level = 3;
    else if (rssi > -75) level = 2;
    else if (rssi > -85) level = 1;

    bars.forEach((b,i)=> b.classList.toggle("active", i<level));
  } else {
    statusEl.innerText = "🔴 OFFLINE";
    statusEl.className = "offline";
    bars.forEach(b=>b.classList.remove("active"));
  }
}, 2000);

</script>

</body>
</html>
